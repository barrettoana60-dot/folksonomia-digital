<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" preserveAspectRatio="xMidYMid slice">
  <!-- FUNDO CREME -->
  <rect width="1920" height="1080" fill="#EEEBE3"/>

  <!-- ============ CANTO SUPERIOR ESQUERDO ============ -->
  <!-- Grande círculo azul saindo pelo canto -->
  <circle cx="20" cy="-30" r="245" fill="#1E3A8A"/>
  <!-- Círculo laranja pequeno -->
  <circle cx="100" cy="220" r="58" fill="#E8490A"/>
  <!-- Pílula verde alta -->
  <rect x="62" y="250" width="78" height="200" rx="39" fill="#1A6B3A"/>

  <!-- ============ CANTO INFERIOR ESQUERDO ============ -->
  <!-- Retângulo vermelho arredondado saindo do canto -->
  <rect x="-10" y="595" width="255" height="245" rx="38" fill="#C0252B"/>
  <!-- Meia lua amarela (D deitado pra direita) -->
  <ellipse cx="286" cy="900" rx="95" ry="118" fill="#E8A920"/>
  <!-- Cortar metade esquerda da elipse para fazer o D -->
  <rect x="0" y="782" width="290" height="298" fill="#EEEBE3"/>
  <!-- Reconstruir o D amarelo certo (semicírculo) -->
  <path d="M 255,782 A 118,118 0 0 1 255,1080 L 185,1080 L 185,782 Z" fill="#E8A920"/>

  <!-- ============ CANTO SUPERIOR DIREITO ============ -->
  <!-- Bloco laranja grande no canto superior direito -->
  <rect x="1600" y="-10" width="330" height="220" rx="0" fill="#E8490A"/>
  <!-- Recorte branco (a mordida) para simular o círculo vazio -->
  <circle cx="1740" cy="200" r="92" fill="#EEEBE3"/>
  <!-- Círculo azul sobre o recorte -->
  <circle cx="1830" cy="185" r="75" fill="#1E3A8A"/>

  <!-- ============ CANTO INFERIOR DIREITO ============ -->
  <!-- Pílula verde no extremo direito -->
  <rect x="1855" y="430" width="78" height="210" rx="39" fill="#1A6B3A"/>
  <!-- Grande retângulo amarelo/dourado -->
  <rect x="1480" y="640" width="460" height="215" rx="80" fill="#E8A920"/>
  <!-- Grande retângulo azul abaixo do amarelo -->
  <rect x="1540" y="760" width="420" height="230" rx="80" fill="#1E3A8A"/>
  <!-- Círculo vermelho sobre o azul -->
  <circle cx="1750" cy="880" r="68" fill="#C0252B"/>
</svg>
